{% extends 'chat/base.html' %}

{% block content %}
<div class="container-fluid vh-100">
    <div class="row h-100">
        <div class="col-md-4 col-lg-3 border-end d-flex flex-column collapse d-md-block" id="sidebar">
            <div class="p-3 flex-grow-1 overflow-auto">
               <h3 class="h5">Chats</h3>
                <form action="" method="get" class="mb-3">
                    <div class="input-group">
                        <input type="search" name="p" placeholder="Search Chat..." class="form-control">
                        <button type="submit" class="btn btn-outline-primary">Search</button>
                    </div>
                </form>
                
                <hr>
                <div class="list-group list-group-flush">
                    {% for user in users %}
                        {% if user != request.user %}
                            <a href="{% url 'chat' user.id %}" class="list-group-item list-group-item-action d-flex align-items-center">
                                <div class="avatar bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-2" 
                                     style="width: 40px; height: 40px; font-weight: bold; font-size: 18px;">
                                    {{ user.username|first|upper }}
                                </div>                                
                                {{ user.username.capitalize }}
                            </a>
                        {% endif %}
                    {% endfor %}
                </div>
            </div>
        </div>
        <div class="col-md-8 col-lg-9 d-flex flex-column">
            <div class="d-block d-md-none p-2 border-bottom">
                <button class="btn btn-outline-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#sidebar" aria-expanded="false" aria-controls="sidebar">
                    <i class="fas fa-bars"></i> Menu
                </button>
            </div>
            <div class="flex-grow-1 d-flex flex-column">
                {% if page == 'home' %}
                    <div class="text-center py-5 flex-grow-1 d-flex align-items-center justify-content-center">
                        <h1 class="display-4 text-muted">Select a chat</h1>
                    </div>
                {% endif %}
                {% block chat %}

                {% endblock %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
